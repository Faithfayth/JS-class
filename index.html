<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Open console for javascript</h1>





    <script>
        console.log("Hello, World!");
        alert("Am alerting you, about this website!"); //javascript has to run after the page is loaded, so it can interact with the elements on the page. If you place the script tag in the head, it will run before the page is loaded, and it will not be able to find the elements on the page. By placing the script tag at the end of the body, you ensure that the script runs after the page is loaded, and it can interact with the elements on the page.
    </script>
    <script src="index.js"></script> // atributes in html
</body>
</html>
