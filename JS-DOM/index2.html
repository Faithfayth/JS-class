<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <title>JS-Dom</title>
</head>
<body>
    <h1 class="h1" id="main-heading"><u>Hello, world of DOM.</u></h1>
    <P class="p1 intro-paragraph">This is a simple paragraph</P>
<!-- //can use the content editable attribute to make the content of an element editable by the user. 
//This can be useful for creating a simple text editor or for allowing users to edit the content of a 
//webpage without having to use a separate form or input field. When an element is set to contenteditable, 
//the user can click on it and start typing to edit the content. The changes made by the user will be reflected 
//in the DOM and can be accessed using JavaScript.

//innerHTML, shows whats inside an element, including the HTML tags. textContent, shows only the text content of an element, without the HTML tags.
//innerHTML shows exactly whats inside the element.     -->
    <p class="intro-paragraph" contenteditable="true">This is also a paragraph</P>

    <button id="change-paragraph">Change paragraph</button>


    <script src="main.js"></script>
    
</body>
</html>
